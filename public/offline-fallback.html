<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Collab Editor — Offline</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        min-height: 100vh;
        margin: 0;
        padding: 1.5rem;
        text-align: center;
        background: #fafafa;
        color: #171717;
      }
      button {
        font: inherit;
        padding: 0.5rem 1rem;
        border: 1px solid #d4d4d4;
        border-radius: 0.5rem;
        background: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1 style="font-size: 1.125rem; margin: 0">You are offline</h1>
    <p style="margin: 0; color: #525252">
      Open the dashboard once while online to cache the app for offline use.
    </p>
    <button type="button" onclick="location.reload()">Retry</button>
  </body>
</html>
